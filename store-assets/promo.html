<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChronoPanel Promo Assets</title>
    <link rel="stylesheet" href="./promo.css" />
  </head>
  <body>
    <main class="page">
      <section class="asset asset-large">
        <div class="copy">
          <p class="eyebrow">ChronoPanel</p>
          <h1>Private browser time, clearly summarized.</h1>
          <p class="lede">Daily totals, weekly trends, top websites, and categories. Stored locally on your device.</p>
        </div>
        <div class="artboard">
          <div class="ring-card">
            <div class="ring"></div>
            <div>
              <p class="meta">Today</p>
              <strong>4h 18m</strong>
              <p class="meta">+12% vs yesterday</p>
            </div>
          </div>
          <div class="bars-card">
            <p class="meta">7-day activity</p>
            <div class="bars">
              <span style="height:34%"></span>
              <span style="height:50%"></span>
              <span style="height:42%"></span>
              <span style="height:74%"></span>
              <span style="height:69%"></span>
              <span style="height:58%"></span>
              <span class="active" style="height:88%"></span>
            </div>
          </div>
        </div>
      </section>

      <section class="asset asset-small">
        <div class="small-copy">
          <p class="eyebrow">ChronoPanel</p>
          <h2>A calmer view of your browsing habits.</h2>
        </div>
        <div class="small-ring"></div>
      </section>
    </main>
  </body>
</html>
